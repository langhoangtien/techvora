services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tekvora
      POSTGRES_USER: tekvora
      POSTGRES_PASSWORD: tekvora
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekvora -d tekvora"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_local_data:
