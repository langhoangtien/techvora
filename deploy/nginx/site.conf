# Replace tekvora.de with your production domain.
# This file is intended for /etc/nginx/sites-available/tekvora.conf.

limit_req_zone $binary_remote_addr zone=tekvora_general:20m rate=10r/s;
limit_req_zone $binary_remote_addr zone=tekvora_api:20m rate=3r/s;
limit_req_zone $binary_remote_addr zone=tekvora_admin:20m rate=2r/s;
limit_req_zone $binary_remote_addr zone=tekvora_search:20m rate=2r/s;
limit_req_zone $binary_remote_addr zone=tekvora_auth:20m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=tekvora_conn:20m;

upstream tekvora_nextjs {
  server 127.0.0.1:3008;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name tekvora.de www.tekvora.de;

  include /etc/nginx/snippets/cloudflare-real-ip.conf;

  location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name tekvora.de www.tekvora.de;

  include /etc/nginx/snippets/cloudflare-real-ip.conf;

  ssl_certificate /etc/letsencrypt/live/tekvora.de/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tekvora.de/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/tekvora.de/chain.pem;

  client_max_body_size 20m;
  client_body_timeout 15s;
  client_header_timeout 15s;
  keepalive_timeout 65s;
  send_timeout 30s;
  proxy_connect_timeout 10s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;
  # If your Nginx build has the Brotli module, enable these lines:
  # brotli on;
  # brotli_comp_level 5;
  # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  limit_conn tekvora_conn 30;
  limit_req zone=tekvora_general burst=50 nodelay;

  location ~ /\.(?!well-known/acme-challenge/) {
    deny all;
  }

  location ~* (^|/)(\.env|\.git|composer\.(json|lock)|package-lock\.json|yarn\.lock|pnpm-lock\.yaml)$ {
    return 404;
  }

  location ~* /(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|\.svn|\.hg|cgi-bin|vendor/phpunit|actuator|server-status) {
    return 444;
  }

  location ^~ /api/auth/ {
    limit_req zone=tekvora_auth burst=5 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location ^~ /api/ {
    limit_req zone=tekvora_api burst=20 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location = /admin/login {
    limit_req zone=tekvora_auth burst=5 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location = /admin {
    limit_req zone=tekvora_admin burst=20 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location ^~ /admin/ {
    limit_req zone=tekvora_admin burst=20 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location = /search {
    limit_req zone=tekvora_search burst=20 nodelay;
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }

  location / {
    proxy_pass http://tekvora_nextjs;
    include /etc/nginx/proxy-params;
  }
}
