services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  migrate:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE in .env.production}
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "./node_modules/.bin/prisma migrate deploy"

  app:
    image: ${DOCKER_IMAGE:?Set DOCKER_IMAGE in .env.production}
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3008}:3008"
    volumes:
      - /opt/tekvora/uploads:/app/public/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3008/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
