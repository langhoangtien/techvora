name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "22"
  DEPLOY_PATH: /opt/tekvora
  IMAGE_NAME: ${{ secrets.DOCKER_IMAGE || format('ghcr.io/{0}', github.repository) }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Build Next.js
        run: npm run build --if-present

      - name: Set image tags
        id: image
        shell: bash
        run: |
          IMAGE_NAME_LOWER="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE_NAME_LOWER}" >> "$GITHUB_OUTPUT"
          echo "sha=${IMAGE_NAME_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME_LOWER}:latest" >> "$GITHUB_OUTPUT"
          echo "migrate_sha=${IMAGE_NAME_LOWER}:${GITHUB_SHA}-migrate" >> "$GITHUB_OUTPUT"
          echo "migrate_latest=${IMAGE_NAME_LOWER}:latest-migrate" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ steps.image.outputs.migrate_sha }}
            ${{ steps.image.outputs.migrate_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${DEPLOY_PATH}'"
          scp -i ~/.ssh/deploy_key docker-compose.production.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/docker-compose.yml"

      - name: Deploy on VPS
        shell: bash
        env:
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          IMAGE_SHA: ${{ steps.image.outputs.sha }}
          IMAGE_MIGRATE_SHA: ${{ steps.image.outputs.migrate_sha }}
        run: |
          GHCR_PASSWORD_B64="$(printf '%s' "$GHCR_PASSWORD" | base64 -w0)"

          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_PASSWORD_B64='${GHCR_PASSWORD_B64}' GHCR_USERNAME='${{ github.actor }}' IMAGE_SHA='${IMAGE_SHA}' IMAGE_MIGRATE_SHA='${IMAGE_MIGRATE_SHA}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ ! -f .env.production ]; then
            echo ".env.production is missing in $DEPLOY_PATH" >&2
            exit 1
          fi

          printf '%s' "$GHCR_PASSWORD_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null

          if grep -q '^DOCKER_IMAGE=' .env.production; then
            sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${IMAGE_SHA}|" .env.production
          else
            printf '\nDOCKER_IMAGE=%s\n' "$IMAGE_SHA" >> .env.production
          fi

          if grep -q '^DOCKER_IMAGE_MIGRATE=' .env.production; then
            sed -i "s|^DOCKER_IMAGE_MIGRATE=.*|DOCKER_IMAGE_MIGRATE=${IMAGE_MIGRATE_SHA}|" .env.production
          else
            printf '\nDOCKER_IMAGE_MIGRATE=%s\n' "$IMAGE_MIGRATE_SHA" >> .env.production
          fi

          docker compose --env-file .env.production -f docker-compose.yml pull app migrate

          docker compose --env-file .env.production -f docker-compose.yml run --rm migrate

          docker compose --env-file .env.production -f docker-compose.yml up -d app --remove-orphans

          docker image prune -af --filter "until=168h"
          EOF
