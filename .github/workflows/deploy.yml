name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "22"
  DEPLOY_PATH: /opt/tekvora
  IMAGE_NAME: ${{ secrets.DOCKER_IMAGE || format('ghcr.io/{0}', github.repository) }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Build Next.js
        run: npm run build --if-present

      - name: Set image tags
        id: image
        shell: bash
        run: |
          IMAGE_NAME_LOWER="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE_NAME_LOWER}" >> "$GITHUB_OUTPUT"
          echo "sha=${IMAGE_NAME_LOWER}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_NAME_LOWER}:latest" >> "$GITHUB_OUTPUT"
          echo "migrate_sha=${IMAGE_NAME_LOWER}:${GITHUB_SHA}-migrate" >> "$GITHUB_OUTPUT"
          echo "migrate_latest=${IMAGE_NAME_LOWER}:latest-migrate" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ steps.image.outputs.migrate_sha }}
            ${{ steps.image.outputs.migrate_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p '${DEPLOY_PATH}'"
          scp -i ~/.ssh/deploy_key docker-compose.production.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${DEPLOY_PATH}/docker-compose.yml"
          echo "Compose file uploaded: docker-compose.yml"

      - name: Deploy on VPS
        shell: bash
        env:
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          IMAGE_SHA: ${{ steps.image.outputs.sha }}
          IMAGE_MIGRATE_SHA: ${{ steps.image.outputs.migrate_sha }}
        run: |
          GHCR_PASSWORD_B64="$(printf '%s' "$GHCR_PASSWORD" | base64 -w0)"

          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "GHCR_PASSWORD_B64='${GHCR_PASSWORD_B64}' GHCR_USERNAME='${{ github.actor }}' IMAGE_SHA='${IMAGE_SHA}' IMAGE_MIGRATE_SHA='${IMAGE_MIGRATE_SHA}' DEPLOY_PATH='${DEPLOY_PATH}' bash -s" <<'EOF'
          set -euo pipefail

          echo "=== Starting deployment ==="
          cd "$DEPLOY_PATH"
          echo "Working directory: $(pwd)"
          echo "Image SHA: ${IMAGE_SHA}"
          echo "Migrate SHA: ${IMAGE_MIGRATE_SHA}"

          if [ ! -f .env.production ]; then
            echo "ERROR: .env.production is missing in $DEPLOY_PATH" >&2
            echo "Files in $DEPLOY_PATH:"
            ls -la "$DEPLOY_PATH" || true
            exit 1
          fi

          echo "=== Updating .env.production ==="
          cp .env.production .env.production.backup.$(date +%s)

          TMP_ENV=$(mktemp)
          trap "rm -f $TMP_ENV" EXIT

          cp .env.production "$TMP_ENV"
          sed -i '/^DOCKER_IMAGE=/d; /^DOCKER_IMAGE_MIGRATE=/d' "$TMP_ENV"
          {
            echo "DOCKER_IMAGE=${IMAGE_SHA}"
            echo "DOCKER_IMAGE_MIGRATE=${IMAGE_MIGRATE_SHA}"
          } >> "$TMP_ENV"
          mv "$TMP_ENV" .env.production

          echo "=== Verifying DOCKER_IMAGE variables ==="
          if ! grep -q "^DOCKER_IMAGE=${IMAGE_SHA}$" .env.production; then
            echo "ERROR: DOCKER_IMAGE not properly set" >&2
            echo "Content:"
            cat .env.production
            exit 1
          fi

          echo "Current DOCKER_IMAGE settings:"
          grep "^DOCKER_IMAGE" .env.production

          echo "=== Docker login ==="
          if ! printf '%s' "$GHCR_PASSWORD_B64" | base64 -d | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin >/dev/null 2>&1; then
            echo "ERROR: Docker login failed" >&2
            exit 1
          fi
          echo "✓ Docker login successful"

          echo "=== Pulling images ==="
          if ! docker compose --env-file .env.production -f docker-compose.yml pull app migrate; then
            echo "ERROR: Failed to pull images" >&2
            exit 1
          fi
          echo "✓ Images pulled successfully"

          echo "=== Running database migrations ==="
          if ! docker compose --env-file .env.production -f docker-compose.yml run --rm migrate; then
            echo "ERROR: Migration failed" >&2
            docker compose --env-file .env.production -f docker-compose.yml logs migrate || true
            exit 1
          fi
          echo "✓ Migrations completed"

          echo "=== Stopping old containers ==="
          docker compose --env-file .env.production -f docker-compose.yml down || true

          echo "=== Starting app ==="
          if ! docker compose --env-file .env.production -f docker-compose.yml up -d --force-recreate --remove-orphans app; then
            echo "ERROR: Failed to start app" >&2
            docker compose --env-file .env.production -f docker-compose.yml logs app || true
            exit 1
          fi
          echo "✓ App started"
          RUNNING_IMAGES="$(docker inspect "$(docker compose --env-file .env.production -f docker-compose.yml ps -q app)" --format='{{.Config.Image}}')"
          echo "Expected image: $IMAGE_SHA"
          echo "Running image: $RUNNING_IMAGES"

          if [ "$RUNNING_IMAGES" != "$IMAGE_SHA" ]; then
            echo "ERROR: App is still running old image" >&2
            exit 1
          fi

          echo "=== Checking app container ==="
          sleep 5

          APP_CONTAINER_ID="$(docker compose --env-file .env.production -f docker-compose.yml ps -q app || true)"

          if [ -z "$APP_CONTAINER_ID" ]; then
            echo "ERROR: App container was not created" >&2
            echo "Running containers:"
            docker compose --env-file .env.production -f docker-compose.yml ps -a || true
            echo "Logs:"
            docker compose --env-file .env.production -f docker-compose.yml logs app || true
            exit 1
          fi

          echo "App container ID: $APP_CONTAINER_ID"

          APP_STATUS="$(docker inspect -f '{{.State.Status}}' "$APP_CONTAINER_ID")"
          echo "App status: $APP_STATUS"

          if [ "$APP_STATUS" != "running" ]; then
            echo "ERROR: App container is not running" >&2
            docker inspect "$APP_CONTAINER_ID" || true
            docker logs "$APP_CONTAINER_ID" || true
            exit 1
          fi

          echo "=== Waiting for app to be healthy ==="
          HEALTH_CHECK_COUNT=0
          while [ $HEALTH_CHECK_COUNT -lt 24 ]; do
            HEALTH_CHECK_COUNT=$((HEALTH_CHECK_COUNT + 1))
            APP_HEALTH="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$APP_CONTAINER_ID")" || true

            echo "[$HEALTH_CHECK_COUNT/24] Health: $APP_HEALTH"

            if [ "$APP_HEALTH" = "healthy" ]; then
              echo "✓ App is healthy"
              break
            fi

            if [ "$APP_HEALTH" = "unhealthy" ]; then
              echo "ERROR: App is unhealthy" >&2
              docker logs "$APP_CONTAINER_ID" || true
              exit 1
            fi

            sleep 5
          done

          APP_HEALTH="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$APP_CONTAINER_ID")" || true
          if [ "$APP_HEALTH" != "healthy" ]; then
            echo "ERROR: App did not become healthy. Final health: $APP_HEALTH" >&2
            docker logs "$APP_CONTAINER_ID" || true
            exit 1
          fi

          echo "=== Cleanup old images ==="
          docker image prune -af --filter "until=168h" || true

          echo "=== ✓ Deployment completed successfully ===" 

          echo "=== Deployment completed successfully ==="
          EOF
